[build]
  base = "."
  command = "npm install && cd client && npm run build"
  publish = "client/dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# Netlify Functions mit esbuild bundlen (TypeScript Support)
[functions]
  node_bundler = "esbuild"
  included_files = ["server/src/**"]

# API-Requests an die Netlify Function weiterleiten
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

# SPA Fallback – alle anderen Routen an index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
